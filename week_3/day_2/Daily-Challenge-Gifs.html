<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GIF Finder</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --border: #2a2a2a;
      --accent: #ff3c3c;
      --accent2: #ff9f1c;
      --text: #f0f0f0;
      --muted: #666;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      padding: 0 0 60px;
      overflow-x: hidden;
    }

    /* Header */
    header {
      border-bottom: 1px solid var(--border);
      padding: 32px 40px 28px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 100;
      backdrop-filter: blur(8px);
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.4rem, 6vw, 4rem);
      letter-spacing: 0.04em;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    /* Search form */
    .search-bar {
      padding: 28px 40px;
      display: flex;
      gap: 12px;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }

    .input-wrap {
      position: relative;
      flex: 1;
      max-width: 480px;
    }

    .input-wrap::before {
      content: '>';
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--accent);
      font-family: 'DM Mono', monospace;
      font-size: 1rem;
      pointer-events: none;
    }

    input[type="text"] {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.9rem;
      padding: 12px 16px 12px 36px;
      outline: none;
      transition: border-color 0.2s;
      letter-spacing: 0.04em;
    }

    input[type="text"]:focus {
      border-color: var(--accent);
    }

    input[type="text"]::placeholder {
      color: var(--muted);
    }

    .btn {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.1em;
      padding: 12px 28px;
      border: none;
      cursor: pointer;
      transition: all 0.15s;
      text-transform: uppercase;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover {
      background: #ff5a5a;
      transform: translateY(-1px);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-danger {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      padding: 12px 20px;
    }

    .btn-danger:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Count bar */
    .count-bar {
      padding: 14px 40px;
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #gif-count { color: var(--accent2); }

    /* Grid */
    #gif-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1px;
      background: var(--border);
      padding-top: 1px;
    }

    .gif-card {
      position: relative;
      background: var(--surface);
      overflow: hidden;
      animation: fadeSlide 0.35s ease both;
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .gif-card img {
      width: 100%;
      display: block;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      transition: transform 0.3s ease;
    }

    .gif-card:hover img {
      transform: scale(1.04);
    }

    .gif-card .overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.85));
      padding: 32px 14px 14px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      opacity: 0;
      transition: opacity 0.25s;
    }

    .gif-card:hover .overlay {
      opacity: 1;
    }

    .gif-tag {
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent2);
      background: rgba(0,0,0,0.5);
      padding: 3px 8px;
    }

    .delete-btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: var(--accent);
      color: #fff;
      border: none;
      cursor: pointer;
      padding: 5px 12px;
      transition: background 0.15s;
    }

    .delete-btn:hover {
      background: #ff5a5a;
    }

    /* Empty state */
    #empty-state {
      text-align: center;
      padding: 100px 40px;
      color: var(--muted);
    }

    #empty-state .big {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 5rem;
      color: var(--border);
      letter-spacing: 0.06em;
      line-height: 1;
      margin-bottom: 16px;
    }

    #empty-state p {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* Loader */
    .loader {
      display: none;
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 8px;
    }

    .loader.active { display: block; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Error toast */
    #error-toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--accent);
      color: #fff;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      padding: 10px 24px;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
      z-index: 999;
    }

    #error-toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    @media (max-width: 600px) {
      header, .search-bar, .count-bar { padding-left: 20px; padding-right: 20px; }
      .search-bar { flex-wrap: wrap; }
      #gif-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
    }
  </style>
</head>
<body>

  <header>
    <div>
      <div class="subtitle">Powered by Giphy API</div>
      <h1>GIF FINDER</h1>
    </div>
  </header>

  <div class="search-bar">
    <div class="input-wrap">
      <input type="text" id="search-input" placeholder="search for a category..." autocomplete="off" />
    </div>
    <button class="btn btn-primary" id="fetch-btn">Fetch GIF</button>
    <div class="loader" id="loader"></div>
    <button class="btn btn-danger" id="delete-all-btn">Delete All</button>
  </div>

  <div class="count-bar">
    <span>GIFs loaded: <span id="gif-count">0</span></span>
    <span id="last-search"></span>
  </div>

  <div id="gif-grid"></div>

  <div id="empty-state">
    <div class="big">NO GIFS</div>
    <p>Search a category to get started</p>
  </div>

  <div id="error-toast"></div>

  <script>
    const API_KEY = 'hpvZycW22qCjn5cRM1xtWB8NKq4dQ2My';
    const grid = document.getElementById('gif-grid');
    const countEl = document.getElementById('gif-count');
    const emptyState = document.getElementById('empty-state');
    const loader = document.getElementById('loader');
    const lastSearchEl = document.getElementById('last-search');
    const errorToast = document.getElementById('error-toast');
    const searchInput = document.getElementById('search-input');

    let gifCount = 0;

    function updateCount() {
      gifCount = grid.querySelectorAll('.gif-card').length;
      countEl.textContent = gifCount;
      emptyState.style.display = gifCount === 0 ? 'block' : 'none';
    }

    function showError(msg) {
      errorToast.textContent = msg;
      errorToast.classList.add('show');
      setTimeout(() => errorToast.classList.remove('show'), 3000);
    }

    async function fetchGif() {
      const tag = searchInput.value.trim();
      if (!tag) { showError('Please enter a search category'); return; }

      loader.classList.add('active');
      document.getElementById('fetch-btn').disabled = true;

      try {
        const url = `https://api.giphy.com/v1/gifs/random?api_key=${API_KEY}&tag=${encodeURIComponent(tag)}&rating=g`;
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP error ${res.status}`);
        const data = await res.json();

        if (!data.data || !data.data.images) throw new Error('No GIF found for that category');

        const gifUrl = data.data.images.downsized_large?.url || data.data.images.original?.url;
        appendGif(gifUrl, tag);

        lastSearchEl.textContent = `Last: "${tag}"`;
      } catch (err) {
        showError(err.message || 'Failed to fetch GIF');
      } finally {
        loader.classList.remove('active');
        document.getElementById('fetch-btn').disabled = false;
      }
    }

    function appendGif(url, tag) {
      const card = document.createElement('div');
      card.className = 'gif-card';

      const img = document.createElement('img');
      img.src = url;
      img.alt = tag;
      img.loading = 'lazy';

      const overlay = document.createElement('div');
      overlay.className = 'overlay';

      const tagEl = document.createElement('span');
      tagEl.className = 'gif-tag';
      tagEl.textContent = tag;

      const delBtn = document.createElement('button');
      delBtn.className = 'delete-btn';
      delBtn.textContent = 'Delete';
      delBtn.addEventListener('click', () => {
        card.style.transition = 'opacity 0.25s, transform 0.25s';
        card.style.opacity = '0';
        card.style.transform = 'scale(0.92)';
        setTimeout(() => { card.remove(); updateCount(); }, 260);
      });

      overlay.appendChild(tagEl);
      overlay.appendChild(delBtn);
      card.appendChild(img);
      card.appendChild(overlay);
      grid.appendChild(card);

      updateCount();
    }

    document.getElementById('fetch-btn').addEventListener('click', fetchGif);

    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') fetchGif();
    });

    document.getElementById('delete-all-btn').addEventListener('click', () => {
      const cards = grid.querySelectorAll('.gif-card');
      cards.forEach((c, i) => {
        setTimeout(() => {
          c.style.transition = 'opacity 0.2s, transform 0.2s';
          c.style.opacity = '0';
          c.style.transform = 'scale(0.9)';
          setTimeout(() => { c.remove(); updateCount(); }, 200);
        }, i * 40);
      });
    });

    updateCount();
  </script>
</body>
</html>
